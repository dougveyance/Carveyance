<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrong Turn — Carveyance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--steel:#2E6E96;--sky:#4E8DB5;--ink:#141820;--white:#fff;--mid:#6b7684;--accent:#e05c2a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--white);
  min-height:100vh;display:flex;flex-direction:column}
nav{height:64px;display:flex;align-items:center;padding:0 40px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.08em;color:var(--white)}
.brand span{color:var(--sky)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 24px}
.code{font-family:'Bebas Neue',sans-serif;font-size:clamp(90px,18vw,180px);
  line-height:1;letter-spacing:.04em;color:var(--steel)}
.hed{font-family:'DM Serif Display',serif;font-size:clamp(24px,4vw,40px);margin:8px 0 14px}
.hed em{font-style:italic;color:rgba(255,255,255,.7)}
.dek{font-size:15px;font-weight:300;color:rgba(255,255,255,.55);max-width:440px;line-height:1.7;margin-bottom:30px}
.btn{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  background:var(--accent);color:var(--white);padding:14px 30px;border-radius:4px;transition:background .2s;text-decoration:none}
.btn:hover{background:#c44e20}
footer{padding:20px;text-align:center;font-size:11px;letter-spacing:.06em;color:#2a3040}
</style>
</head>
<body>
<nav><span class="brand">Car<span>veyance</span></span></nav>
<main>
  <div class="code">404</div>
  <h1 class="hed">This road <em>doesn't exist</em></h1>
  <p class="dek">Looks like you took a wrong turn. The page you're after may have moved, or never made it off the drawing board.</p>
  <a class="btn" href="/">Back to the Garage</a>
</main>
<footer>© 2026 Carveyance — For the love of the drive.</footer>
</body>
</html>
