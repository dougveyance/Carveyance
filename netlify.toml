# Carveyance — Netlify configuration
# Static site: no build step. Netlify serves the files as-is and
# auto-detects the contact forms in index.html on every deploy.

[build]
  publish = "."
  # No build command — this is hand-authored static HTML.

# Long cache for images only (they never change once uploaded).
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The site engine and article list must NOT be cached hard,
# or new articles won't show up until browsers expire the old copy.
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/articles.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sensible security headers site-wide
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Netlify automatically serves /404.html for unknown paths —
# no catch-all redirect needed (a catch-all here would shadow real pages).
